<style>
  .stats-strip {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 2rem;
  }
  .stats-inner {
    max-width: var(--max-w);
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .stat-item { background: var(--bg); padding: 1.5rem 2rem; text-align: center; }
  .stat-value { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; color: var(--text); line-height: 1; }
  .stat-value .accent { color: var(--accent); }
  .stat-label { margin-top: 0.4rem; font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.02em; }
  @media (max-width: 480px) {
    .stats-strip { padding: 1.5rem 1rem; }
    .stats-inner { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .stat-item { padding: 1.25rem 1rem; }
    .stat-value { font-size: 1.5rem; }
    .stat-label {
      max-width: 10ch;
      margin-inline: auto;
      line-height: 1.45;
    }
  }
</style>

<script>
  const stats = [
    { value: '1', label: 'Storage engine', accent: true },
    { value: '1', label: 'Canonical file per doc', accent: true },
    { value: '2', label: 'Sync modes', accent: true },
    { value: 'SQL', label: 'Application query surface', accent: false },
  ]
</script>

<section class="stats-strip" aria-label="Key facts">
  <div class="stats-inner">
    <loop :for="let stat of stats">
      <div class="stat-item">
        <div class="stat-value">
          <logic :if="stat.accent">
            <span class="accent">{stat.value}</span>
          </logic>
          <logic else="">
            {stat.value}
          </logic>
        </div>
        <div class="stat-label">{stat.label}</div>
      </div>
    </loop>
  </div>
</section>
