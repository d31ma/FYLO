version: 1
frontend:
    phases:
        preBuild:
            commands:
                - curl -fsSL https://bun.sh/install | bash
                - export PATH="$HOME/.bun/bin:$PATH"
                - rm -rf node_modules dist ~/.bun/install/cache
                - bun install --no-cache
        build:
            commands:
                - export PATH="$HOME/.bun/bin:$PATH"
                - bun run bundle
                # Serve the install scripts at the site root so `fylo.del.ma/install.sh`
                # (and install.ps1) resolve to a short, memorable command. Tachyon 26.28+
                # emits the web bundle under dist/web/.
                - cp client/shared/assets/install.sh client/shared/assets/install.ps1 dist/web/
    artifacts:
        baseDirectory: dist/web
        files:
            - '**/*'
    cache:
        paths: []
