<footer class="w-footer w-footer--border site-footer">
  <div class="w-container w-container--xl">
    <div class="w-grid-row footer-row">
      <div class="w-grid-col-12 w-grid-col-md-5">
        <a href="/" class="footer-brand" aria-label="FYLO home">
          <svg class="footer-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <path d="M9 3.5h9.5L26 11v15a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3V6.5a3 3 0 0 1 3-3Z" fill="rgba(248,155,75,0.12)" stroke="#f89b4b" stroke-width="1.8" stroke-linejoin="round" />
            <path d="M18.5 3.5V9a2 2 0 0 0 2 2H26" stroke="#f89b4b" stroke-width="1.8" stroke-linejoin="round" />
            <circle cx="12.5" cy="15.5" r="1.7" fill="#f89b4b" />
            <circle cx="12.5" cy="23.5" r="1.7" fill="#f89b4b" />
            <circle cx="19.5" cy="17.5" r="1.7" fill="#f89b4b" />
            <path d="M12.5 17.4v3.9M19.5 19.4a7.2 7.2 0 0 1-5.1 4" stroke="#f89b4b" stroke-width="1.6" stroke-linecap="round" />
          </svg>
          FYLO
        </a>
        <p class="footer-desc">
          A single-binary document store with zero-payload prefix indexes. One canonical file per
          document — indexes are accelerators, never the source of truth.
        </p>
        <p class="footer-release"><a :href="siteUrl">{siteUrl}</a></p>
      </div>

      <loop :for="let group of linkGroups">
        <div class="w-grid-col-6 w-grid-col-md-2">
          <div class="footer-col-title">{group.title}</div>
          <ul class="footer-links">
            <loop :for="let link of group.links">
              <li><a :href="link.href" target="_blank" rel="noopener">{link.label}</a></li>
            </loop>
          </ul>
        </div>
      </loop>
    </div>

    <hr class="w-divider footer-divider" />

    <div class="footer-bottom">
      <span>© 2026 FYLO contributors · MIT License</span>
      <span>
        Built with
        <a href="https://github.com/d31ma/Tachyon" target="_blank" rel="noopener">Tachyon</a> &amp;
        <a href="https://duvay.del.ma" target="_blank" rel="noopener">DuVay</a>
      </span>
    </div>
  </div>
</footer>
