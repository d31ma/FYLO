<div class="explorer-tool">
    <section class="explorer-tool-section">
        <h4 id="explorer-export-heading">Export</h4>
        <p id="explorer-export-help" class="explorer-hint">
            Download a document collection as NDJSON.
        </p>
        <div class="explorer-tool-row">
            <select
                id="explorer-export-collection"
                class="w-input"
                aria-label="Collection to export"
                aria-describedby="explorer-export-help"
                :value="fromCol"
                on:change="setFrom(event)"
            >
                <option value="">Choose a collection…</option>
                <loop :for="let c of collections">
                    <option :value="c">{c}</option>
                </loop>
            </select>
            <button
                type="button"
                class="w-btn w-btn-filled"
                :disabled="busy"
                aria-describedby="explorer-export-help"
                on:click="runExport()"
            >
                Export
            </button>
        </div>
    </section>

    <section class="explorer-tool-section">
        <h4 id="explorer-import-heading">Import</h4>
        <logic :if="!writable">
            <p class="explorer-hint">Enable writes to import documents.</p>
        </logic>
        <p id="explorer-import-help" class="explorer-hint">
            Load an NDJSON or JSON-array file into a collection (created if new).
        </p>
        <div class="explorer-tool-row">
            <input
                class="w-input"
                type="text"
                aria-label="Target collection for import"
                aria-describedby="explorer-import-help"
                placeholder="target collection"
                :value="toCol"
                on:input="setTo(event)"
            />
            <input
                type="file"
                aria-label="NDJSON or JSON file to import"
                aria-describedby="explorer-import-help"
                accept=".ndjson,.json,application/json,application/x-ndjson"
                on:change="pickFile(event)"
            />
            <button
                type="button"
                class="w-btn w-btn-filled"
                :disabled="busy || !writable"
                aria-describedby="explorer-import-help"
                on:click="runImport()"
            >
                Import
            </button>
        </div>
    </section>

    <logic :if="message">
        <p class="explorer-note" role="status" aria-live="polite">{message}</p>
    </logic>
</div>
