name: Live S3-compatible recovery gate

on:
    workflow_call:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    live-s3:
        name: Compiled binary backup/restore against MinIO
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            AWS_ACCESS_KEY_ID: fylo-release-gate
            AWS_SECRET_ACCESS_KEY: fylo-release-gate-secret
            AWS_REGION: us-east-1
            FYLO_S3_ENDPOINT: http://127.0.0.1:9000
            FYLO_S3_BUCKET: fylo-live-gate
            FYLO_S3_PREFIX: release-gate/${{ github.run_id }}/${{ github.run_attempt }}
            MINIO_VERSION: RELEASE.2025-10-15T17-29-55Z

        steps:
            - name: Checkout
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version-file: .bun-version

            - name: Setup Go
              uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
              with:
                  go-version: '1.24.x'
                  cache: true

            - name: Install FYLO dependencies
              run: |
                  bun install --frozen-lockfile
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Build and start pinned MinIO
              run: |
                  set -euo pipefail
                  go install "github.com/minio/minio@${MINIO_VERSION}"
                  minio_bin="$(go env GOPATH)/bin/minio"
                  "$minio_bin" --version | tee minio-version.txt
                  mkdir -p "$RUNNER_TEMP/minio-data"
                  nohup "$minio_bin" server "$RUNNER_TEMP/minio-data" \
                    --address 127.0.0.1:9000 \
                    >minio.log 2>&1 &
                  echo "$!" > minio.pid
                  for _ in {1..60}; do
                    if curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null; then
                      exit 0
                    fi
                    sleep 1
                  done
                  cat minio.log
                  exit 1
              env:
                  MINIO_ROOT_USER: fylo-release-gate
                  MINIO_ROOT_PASSWORD: fylo-release-gate-secret

            - name: Create isolated bucket
              run: |
                  aws s3api create-bucket \
                    --bucket "$FYLO_S3_BUCKET" \
                    --endpoint-url "$FYLO_S3_ENDPOINT"

            - name: Build release-identified native executable
              run: |
                  mkdir -p dist-bin
                  bun ./scripts/build-executable.mjs --outfile dist-bin/fylo
                  ./dist-bin/fylo version --output json | tee fylo-identity.json
                  jq -e \
                    --arg commit "$GITHUB_SHA" \
                    '.buildKind == "release" and .commit == $commit and .buildTarget == "linux-x64"' \
                    fylo-identity.json

            - name: Prove live backup and restore
              env:
                  FYLO_REQUIRE_LIVE_S3: '1'
                  FYLO_BINARY: dist-bin/fylo
              run: |
                  set -o pipefail
                  bun test tests/interop/s3-live-binary.test.js \
                    --timeout 300000 \
                    --parallel=1 | tee s3-live-test.log

            - name: Record release evidence
              if: always()
              run: |
                  sha256sum dist-bin/fylo > fylo-binary.sha256
                  {
                    echo "workflow=$GITHUB_WORKFLOW"
                    echo "run=$GITHUB_RUN_ID/$GITHUB_RUN_ATTEMPT"
                    echo "commit=$GITHUB_SHA"
                    echo "runner=$RUNNER_OS/$RUNNER_ARCH"
                    echo "filesystem=$(stat -f -c %T "$RUNNER_TEMP")"
                    echo "prefix=$FYLO_S3_PREFIX"
                  } > s3-live-environment.txt

            - name: Upload live recovery evidence
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: s3-live-evidence-${{ github.sha }}
                  path: |
                      fylo-binary.sha256
                      fylo-identity.json
                      minio-version.txt
                      minio.log
                      s3-live-environment.txt
                      s3-live-test.log
                  if-no-files-found: error
                  retention-days: 90

            - name: Stop MinIO
              if: always()
              run: |
                  if [[ -f minio.pid ]]; then
                    kill "$(cat minio.pid)" 2>/dev/null || true
                  fi
