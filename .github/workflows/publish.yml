name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    test:
        name: Test before release
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Install CHEX and TTID binaries
              run: |
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Type check
              run: bun run typecheck

            - name: Lint
              run: bun run lint

            - name: Run tests
              run: bun run test

    binary-interop:
        name: Compiled binary interop
        runs-on: macos-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Dart
              uses: dart-lang/setup-dart@v1

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.22'

            - name: Install Kotlin compiler
              env:
                  KOTLIN_VERSION: 2.1.10
              run: |
                  set -euo pipefail
                  curl -fsSL \
                    "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip" \
                    -o "$RUNNER_TEMP/kotlin-compiler.zip"
                  unzip -q "$RUNNER_TEMP/kotlin-compiler.zip" -d "$RUNNER_TEMP/kotlin"
                  echo "$RUNNER_TEMP/kotlin/kotlinc/bin" >> "$GITHUB_PATH"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Install CHEX and TTID binaries
              run: |
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Verify interop language toolchains
              run: |
                  python3 --version
                  ruby --version
                  php --version
                  dart --version
                  javac -version
                  java -version
                  dotnet --version
                  c++ --version
                  swift --version
                  kotlinc -version
                  rustc --version
                  go version

            - name: Run compiled binary interop tests
              run: bun run test:interop

    version:
        name: Read version
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.read.outputs.version }}
            tag_exists: ${{ steps.check.outputs.exists }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Read package version
              id: read
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Version: $VERSION"

            - name: Check version tag
              id: check
              env:
                  TAG: v${{ steps.read.outputs.version }}
              run: |
                  if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG already exists; skipping release."
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

    github-release:
        name: Create GitHub release
        runs-on: ubuntu-latest
        needs: [test, binary-interop, version]
        if: >-
            ${{
              needs.test.result == 'success' &&
              needs.binary-interop.result == 'success' &&
              needs.version.result == 'success' &&
              needs.version.outputs.tag_exists == 'false'
            }}
        timeout-minutes: 10
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Create and push version tag
              env:
                  VERSION: ${{ needs.version.outputs.version }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag -a "v$VERSION" -m "v$VERSION"
                  git push origin "v$VERSION"

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.version.outputs.version }}
              run: |
                  gh release create "v$VERSION" \
                    --title "v$VERSION" \
                    --generate-notes

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build cross-platform binaries
              run: |
                  set -euo pipefail
                  mkdir -p dist-bin
                  build() {
                    echo "::group::$2"
                    bun build --compile --target="$1" ./src/cli/index.js --outfile "dist-bin/$2"
                    echo "::endgroup::"
                  }
                  build bun-linux-x64     fylo-linux-x64
                  build bun-linux-arm64   fylo-linux-arm64
                  build bun-darwin-x64    fylo-macos-x64
                  build bun-darwin-arm64  fylo-macos-arm64
                  build bun-windows-x64   fylo-windows-x64.exe
                  cd dist-bin && sha256sum fylo-* > SHA256SUMS

            - name: Build local-first web bundle
              run: bun run build:web

            - name: Package language clients
              run: tar -czf fylo-clients.tar.gz clients

            - name: Upload binaries, web bundle, clients, and installers to release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.version.outputs.version }}
              run: |
                  cp dist-web/fylo.mjs dist-web/fylo-web.mjs
                  gh release upload "v$VERSION" \
                    dist-bin/fylo-* dist-bin/SHA256SUMS \
                    dist-web/fylo-web.mjs \
                    fylo-clients.tar.gz \
                    website/client/shared/assets/install.sh \
                    website/client/shared/assets/install.ps1 \
                    --clobber
