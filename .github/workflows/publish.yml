name: Publish

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    packages: read

concurrency:
    group: release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    test:
        name: Test before publish
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@d31ma'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bun run typecheck

            - name: Lint
              run: bun run lint

            - name: Build
              run: bun run build

            - name: Run tests
              run: bun run test

    blackbox-config:
        name: Detect blackbox configuration
        runs-on: ubuntu-latest
        outputs:
            enabled: ${{ steps.detect.outputs.enabled }}
        env:
            BLACKBOX_REPOSITORY: ${{ vars.FYLO_BLACKBOX_REPOSITORY || secrets.FYLO_BLACKBOX_REPOSITORY || vars.BLACKBOX_REPOSITORY || secrets.BLACKBOX_REPOSITORY || vars.NIGHTJAR_BLACKBOX_REPOSITORY || secrets.NIGHTJAR_BLACKBOX_REPOSITORY }}
            BLACKBOX_SSH_KEY: ${{ secrets.FYLO_BLACKBOX_SSH_KEY || secrets.BLACKBOX_SSH_KEY || secrets.NIGHTJAR_BLACKBOX_SSH_KEY }}

        steps:
            - id: detect
              name: Check private suite credentials
              run: |
                  if [ -n "$BLACKBOX_REPOSITORY" ] && [ -n "$BLACKBOX_SSH_KEY" ]; then
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                    echo "Blackbox configuration not present; skipping private package validation."
                  fi

    package-blackbox:
        name: NightJar blackbox tests
        runs-on: ubuntu-latest
        needs: blackbox-config
        if: needs.blackbox-config.outputs.enabled == 'true'
        timeout-minutes: 20
        env:
            BLACKBOX_REPOSITORY: ${{ vars.FYLO_BLACKBOX_REPOSITORY || secrets.FYLO_BLACKBOX_REPOSITORY || vars.BLACKBOX_REPOSITORY || secrets.BLACKBOX_REPOSITORY || vars.NIGHTJAR_BLACKBOX_REPOSITORY || secrets.NIGHTJAR_BLACKBOX_REPOSITORY }}
            BLACKBOX_SSH_KEY: ${{ secrets.FYLO_BLACKBOX_SSH_KEY || secrets.BLACKBOX_SSH_KEY || secrets.NIGHTJAR_BLACKBOX_SSH_KEY }}
            NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}
        steps:
            - name: Checkout FYLO
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@d31ma'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build package
              run: bun run build

            - name: Pack package under test
              id: pack
              run: |
                  npm pack --json --ignore-scripts > /tmp/fylo-pack.json
                  filename=$(node -e "console.log(require('/tmp/fylo-pack.json')[0].filename)")
                  echo "tarball=$PWD/$filename" >> "$GITHUB_OUTPUT"

            - name: Require private blackbox credentials
              run: |
                  if [ -z "$BLACKBOX_REPOSITORY" ]; then
                    echo "::error::Missing BLACKBOX_REPOSITORY variable"
                    exit 1
                  fi
                  if [ -z "$BLACKBOX_SSH_KEY" ]; then
                    echo "::error::Missing BLACKBOX_SSH_KEY secret"
                    exit 1
                  fi

            - name: Checkout private blackbox suite
              uses: actions/checkout@v6
              with:
                  repository: ${{ env.BLACKBOX_REPOSITORY }}
                  ssh-key: ${{ env.BLACKBOX_SSH_KEY }}
                  ref: ${{ vars.FYLO_BLACKBOX_REF || vars.BLACKBOX_REF || vars.NIGHTJAR_BLACKBOX_REF || 'main' }}
                  path: .blackbox-tests

            - name: Patch FYLO blackbox helper for GitHub Packages
              run: node scripts/patch-nightjar-fylo-blackbox.mjs .blackbox-tests

            - name: Run FYLO blackbox tests
              working-directory: .blackbox-tests
              env:
                  FYLO_PACKAGE_TARBALL: ${{ steps.pack.outputs.tarball }}
                  NIGHTJAR_SUITE: fylo
              run: |
                  if [ -f package.json ] || [ -f bun.lock ] || [ -f bun.lockb ]; then
                    bun install --frozen-lockfile
                  fi

                  if [ -f package.json ] && jq -e '.scripts.blackbox' package.json >/dev/null; then
                    bun run blackbox
                  else
                    bun test fylo --timeout 120000
                  fi

    version:
        name: Read version
        runs-on: ubuntu-latest
        outputs:
            package_name: ${{ steps.read.outputs.package_name }}
            version: ${{ steps.read.outputs.version }}
            tag_exists: ${{ steps.check.outputs.exists }}
            github_version_exists: ${{ steps.check_github.outputs.exists }}
            npm_version_exists: ${{ steps.check_npm.outputs.exists }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Read package version
              id: read
              run: |
                  PACKAGE_NAME=$(node -p "require('./package.json').name")
                  VERSION=$(node -p "require('./package.json').version")
                  echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Package: $PACKAGE_NAME"
                  echo "Version: $VERSION"

            - name: Check version tag
              id: check
              env:
                  TAG: v${{ steps.read.outputs.version }}
              run: |
                  if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG already exists; skipping publish and release."
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Check GitHub Packages version
              id: check_github
              env:
                  PACKAGE_NAME: ${{ steps.read.outputs.package_name }}
                  VERSION: ${{ steps.read.outputs.version }}
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  cat > ~/.npmrc <<EOF
                  @d31ma:registry=https://npm.pkg.github.com
                  //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
                  always-auth=true
                  EOF

                  if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "GitHub Packages already has ${PACKAGE_NAME}@${VERSION}."
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Check npm version
              id: check_npm
              env:
                  PACKAGE_NAME: ${{ steps.read.outputs.package_name }}
                  VERSION: ${{ steps.read.outputs.version }}
              run: |
                  if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "npm already has ${PACKAGE_NAME}@${VERSION}."
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

    publish:
        name: Publish to GitHub Packages
        runs-on: ubuntu-latest
        needs: [test, blackbox-config, package-blackbox, version]
        if: >-
            ${{
              always() &&
              needs.test.result == 'success' &&
              needs.blackbox-config.result == 'success' &&
              needs.version.result == 'success' &&
              needs.version.outputs.tag_exists == 'false' &&
              needs.version.outputs.github_version_exists == 'false' &&
              (
                needs.blackbox-config.outputs.enabled == 'false' ||
                needs.package-blackbox.result == 'success'
              )
            }}
        timeout-minutes: 15
        permissions:
            contents: read
            packages: write
        environment: packages-prod
        env:
            NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build package
              run: bun run build

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@d31ma'

            - name: Publish to GitHub Packages
              run: npm publish --tag beta --registry=https://npm.pkg.github.com
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    promote-npm:
        name: Promote to npm registry
        needs: [version, publish]
        if: needs.publish.result == 'success'
        permissions:
            contents: read
            packages: read
        uses: d31ma/FOUNDRY/.github/workflows/promote-npm.yml@main
        with:
            package_name: ${{ needs.version.outputs.package_name }}
            version: ${{ needs.version.outputs.version }}
            npm_dist_tag: latest
            source_repository: ${{ github.repository }}
        secrets:
            NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
            PACKAGES_READ_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}

    github-release:
        name: Create GitHub release
        runs-on: ubuntu-latest
        needs: [version, publish, promote-npm]
        if: needs.version.outputs.tag_exists == 'false'
        timeout-minutes: 10
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Create and push version tag
              env:
                  VERSION: ${{ needs.version.outputs.version }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag -a "v$VERSION" -m "v$VERSION"
                  git push origin "v$VERSION"

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.version.outputs.version }}
              run: |
                  gh release create "v$VERSION" \
                    --title "v$VERSION" \
                    --generate-notes
