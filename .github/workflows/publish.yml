name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    windows-storage:
        name: Windows x64 storage safety (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                os: [windows-2022, windows-2025]

        steps:
            - name: Checkout
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version-file: .bun-version

            - name: Assert native Windows x64 runner
              shell: pwsh
              run: |
                  if (-not [Environment]::Is64BitOperatingSystem) {
                    throw 'The Windows storage gate requires a 64-bit operating system.'
                  }
                  if ($env:RUNNER_OS -ne 'Windows') {
                    throw "The Windows storage gate cannot run on $env:RUNNER_OS."
                  }
                  $platform = bun -p "process.platform"
                  $architecture = bun -p "process.arch"
                  if ($platform -ne 'win32' -or $architecture -ne 'x64') {
                    throw "Expected native win32/x64 Bun, received $platform/$architecture."
                  }

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Install verified Windows vendor binaries
              shell: pwsh
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: ./scripts/install-vendor-bins.ps1

            - name: Verify native lock crash and reclaim
              run: |
                  bun test tests/integration/fs-lock.test.js --timeout 120000 --parallel=1
                  if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
                  bun test tests/integration/machine-hardening.test.js --test-name-pattern 'exclusive root ownership' --timeout 120000 --parallel=1

            - name: Verify interrupted transaction recovery
              run: |
                  bun test tests/integration/transactions.test.js --test-name-pattern 'startup read rolls back a transaction interrupted by SIGKILL|rollback restores document xattrs exactly|recovery rejects symlinked capture paths without changing an outside sentinel|recovery rolls forward after the durable commit marker' --timeout 120000 --parallel=1
                  if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
                  bun test tests/integration/crash-recovery.test.js --timeout 120000 --parallel=1

            - name: Verify NTFS junction and reparse-point defenses
              run: bun test tests/integration/document-path-security.test.js tests/integration/secure-open.test.js --timeout 120000 --parallel=1

            - name: Run Windows storage regression suite
              run: bun test tests/integration/xattr.test.js tests/integration/durable.test.js tests/integration/filesystem.test.js tests/integration/raw-files.test.js tests/integration/collection-lock.test.js tests/integration/vcs-recovery.test.js tests/integration/s3-backup.test.js tests/integration/s3-restore.test.js --timeout 300000 --parallel=1

            - name: Build native Windows executable
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force dist-bin | Out-Null
                  bun ./scripts/build-executable.mjs --outfile ./dist-bin/fylo-windows-x64.exe

            - name: Verify compiled Windows executable behavior
              env:
                  FYLO_REQUIRE_WINDOWS_NATIVE: '1'
                  FYLO_WINDOWS_BINARY: dist-bin/fylo-windows-x64.exe
                  FYLO_REQUIRE_NATIVE_RELEASE: '1'
                  FYLO_BINARY: dist-bin/fylo-windows-x64.exe
                  FYLO_EXPECT_TARGET: windows-x64
              run: |
                  bun test tests/interop/windows-native-binary.test.js --timeout 120000 --parallel=1
                  if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
                  bun test tests/interop/native-release-root-lease.test.js --timeout 120000 --parallel=1

            - name: Upload native-tested Windows release executable
              if: matrix.os == 'windows-2022'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: windows-release-${{ github.sha }}
                  path: dist-bin/fylo-windows-x64.exe
                  if-no-files-found: error
                  compression-level: 0
                  retention-days: 1

    macos-storage:
        name: Native packaged macOS lease (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 20
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-15
                      target: macos-arm64
                      asset: fylo-macos-arm64
                    - os: macos-15-intel
                      target: macos-x64
                      asset: fylo-macos-x64

        steps:
            - name: Checkout
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version-file: .bun-version

            - name: Install dependencies and vendor binaries
              run: |
                  bun install --frozen-lockfile
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Assert native runner architecture
              env:
                  EXPECTED_TARGET: ${{ matrix.target }}
              run: |
                  actual="macos-$(bun -p 'process.arch')"
                  test "$actual" = "$EXPECTED_TARGET"

            - name: Build exact native release executable
              env:
                  ASSET: ${{ matrix.asset }}
              run: |
                  mkdir -p dist-bin
                  bun ./scripts/build-executable.mjs --outfile "dist-bin/$ASSET"

            - name: Verify exact native root lease and identity
              env:
                  FYLO_REQUIRE_NATIVE_RELEASE: '1'
                  FYLO_BINARY: dist-bin/${{ matrix.asset }}
                  FYLO_EXPECT_TARGET: ${{ matrix.target }}
              run: bun test tests/interop/native-release-root-lease.test.js --timeout 120000 --parallel=1

            - name: Upload native-tested macOS executable
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: macos-release-${{ matrix.target }}-${{ github.sha }}
                  path: dist-bin/${{ matrix.asset }}
                  if-no-files-found: error
                  compression-level: 0
                  retention-days: 1

    test:
        name: Test before release
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version-file: .bun-version

            - name: Setup Node
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: '24'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Install CHEX and TTID binaries
              run: |
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Type check
              run: bun run typecheck

            - name: Lint
              run: bun run lint

            - name: Run tests
              run: bun run test

    binary-interop:
        name: Compiled binary interop
        runs-on: macos-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

            - name: Setup Node
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: '24'

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version-file: .bun-version

            - name: Setup Dart
              uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1

            - name: Setup PHP
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
              with:
                  php-version: '8.3'

            - name: Setup .NET
              uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
              with:
                  dotnet-version: '8.0.x'

            - name: Setup Go
              uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
              with:
                  go-version: '1.22'

            - name: Install Kotlin compiler
              run: sh ./scripts/install-kotlin-compiler.sh

            - name: Install dependencies
              run: |
                  bun install --frozen-lockfile
                  (cd website && bun install --frozen-lockfile)
                  (cd explorer && bun install --frozen-lockfile)

            - name: Install CHEX and TTID binaries
              run: |
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Verify interop language toolchains
              run: |
                  python3 --version
                  ruby --version
                  php --version
                  dart --version
                  javac -version
                  java -version
                  dotnet --version
                  c++ --version
                  swift --version
                  kotlinc -version
                  rustc --version
                  go version

            - name: Run compiled binary interop tests
              run: bun run test:interop

    version:
        name: Read version
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.read.outputs.version }}
            tag_exists: ${{ steps.check.outputs.exists }}

        steps:
            - name: Checkout
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
              with:
                  fetch-depth: 0

            - name: Read package version
              id: read
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Version: $VERSION"

            - name: Check version tag
              id: check
              env:
                  TAG: v${{ steps.read.outputs.version }}
              run: |
                  if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG already exists; skipping release."
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

    live-s3:
        name: Live S3-compatible release gate
        uses: ./.github/workflows/s3-live.yml

    release-assets:
        name: Build release assets
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
            attestations: write
            artifact-metadata: write
        needs: [test, binary-interop, windows-storage, macos-storage, live-s3, version]
        if: >-
            ${{
              needs.test.result == 'success' &&
              needs.binary-interop.result == 'success' &&
              needs.windows-storage.result == 'success' &&
              needs.macos-storage.result == 'success' &&
              needs.live-s3.result == 'success' &&
              needs.version.result == 'success' &&
              needs.version.outputs.tag_exists == 'false'
            }}
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version-file: .bun-version

            - name: Install release dependencies
              run: |
                  bun install --frozen-lockfile
                  (cd explorer && bun install --frozen-lockfile)

            - name: Download native-tested Windows release executable
              uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
              with:
                  name: windows-release-${{ github.sha }}
                  path: release-assets

            - name: Download native-tested macOS arm64 release executable
              uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
              with:
                  name: macos-release-macos-arm64-${{ github.sha }}
                  path: release-assets

            - name: Download native-tested macOS x64 release executable
              uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
              with:
                  name: macos-release-macos-x64-${{ github.sha }}
                  path: release-assets

            - name: Build Linux binaries
              run: |
                  set -euo pipefail
                  mkdir -p release-assets
                  build() {
                    echo "::group::$2"
                    bun ./scripts/build-executable.mjs --target "$1" --outfile "release-assets/$2"
                    echo "::endgroup::"
                  }
                  build bun-linux-x64     fylo-linux-x64
                  build bun-linux-arm64   fylo-linux-arm64

            - name: Verify exact native Linux release identity
              run: |
                  set -euo pipefail
                  chmod +x release-assets/fylo-linux-x64
                  release-assets/fylo-linux-x64 version --output json | tee linux-release-identity.json
                  jq -e \
                    --arg commit "$GITHUB_SHA" \
                    '.buildKind == "release" and
                     .commit == $commit and
                     .buildTarget == "linux-x64" and
                     .capabilities.handshake == true and
                     .capabilities.exclusiveRoot == true' \
                    linux-release-identity.json
                  printf '%s\n' '{"op":"handshake"}' |
                    release-assets/fylo-linux-x64 exec --loop |
                    jq -e --arg commit "$GITHUB_SHA" \
                      '.ok == true and .result.buildKind == "release" and .result.commit == $commit'
                  FYLO_REQUIRE_NATIVE_RELEASE=1 \
                    FYLO_BINARY=release-assets/fylo-linux-x64 \
                    FYLO_EXPECT_TARGET=linux-x64 \
                    bun test tests/interop/native-release-root-lease.test.js \
                      --timeout 120000 --parallel=1

            - name: Build local-first web bundle
              run: bun run build:web:wasm

            - name: Package self-hosted Explorer
              env:
                  VERSION: ${{ needs.version.outputs.version }}
              run: |
                  set -euo pipefail
                  if [[ ! "$VERSION" =~ ^[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]; then
                    echo "Explorer release requires a CalVer package version, received $VERSION." >&2
                    exit 1
                  fi
                  explorer_version=$(bun -p 'require("./explorer/package.json").version')
                  if [[ "$explorer_version" != "$VERSION" ]]; then
                    echo "Explorer version $explorer_version does not match release $VERSION." >&2
                    exit 1
                  fi

                  (cd explorer && bun run bundle:release)
                  artifact_json=$(bun scripts/web-artifact.mjs explorer/dist/web release-assets)
                  artifact=$(jq -er '.output' <<<"$artifact_json")
                  archive="release-assets/fylo-explorer-${VERSION}.zip"
                  mv "$artifact" "$archive"

                  unzip -tq "$archive"
                  listing=$(unzip -Z1 "$archive")
                  grep -Fxq 'index.html' <<<"$listing"
                  index=$(unzip -p "$archive" index.html)
                  grep -Fq 'FX | Fylo Explorer' <<<"$index"

            - name: Package language clients
              run: tar -czf release-assets/fylo-clients.tar.gz clients

            - name: Stage web bundle and installers
              run: |
                  set -euo pipefail
                  cp dist-web/fylo.mjs release-assets/fylo-web.mjs
                  cp dist-web/shared.js release-assets/shared.js
                  cp dist-web/dedicated.js release-assets/dedicated.js
                  cp dist-web/fylo-index.wasm release-assets/fylo-index.wasm
                  cp website/client/shared/assets/install.sh release-assets/install.sh
                  cp website/client/shared/assets/install.ps1 release-assets/install.ps1

            - name: Generate SPDX software bill of materials
              uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
              with:
                  path: .
                  format: spdx-json
                  output-file: release-assets/fylo-${{ needs.version.outputs.version }}.spdx.json
                  artifact-name: fylo-${{ needs.version.outputs.version }}.spdx.json
                  upload-artifact: false
                  upload-release-assets: false
                  dependency-snapshot: false
                  syft-version: v1.49.0

            - name: Checksum and verify release assets
              working-directory: release-assets
              env:
                  VERSION: ${{ needs.version.outputs.version }}
              run: |
                  set -euo pipefail
                  expected=$(cat <<EOF
                  dedicated.js
                  fylo-clients.tar.gz
                  fylo-explorer-${VERSION}.zip
                  fylo-index.wasm
                  fylo-linux-arm64
                  fylo-linux-x64
                  fylo-macos-arm64
                  fylo-macos-x64
                  fylo-${VERSION}.spdx.json
                  fylo-web.mjs
                  fylo-windows-x64.exe
                  install.ps1
                  install.sh
                  shared.js
                  EOF
                  )
                  actual=$(find . -maxdepth 1 -type f -print | sed 's|^./||' | sort)
                  diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")
                  while IFS= read -r asset; do
                    sha256sum "$asset"
                  done <<<"$expected" > SHA256SUMS
                  sha256sum --check SHA256SUMS

            - name: Attest release build provenance
              uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
              with:
                  subject-path: release-assets/*

            - name: Attest release SBOM
              uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
              with:
                  subject-path: release-assets/*
                  sbom-path: release-assets/fylo-${{ needs.version.outputs.version }}.spdx.json

            - name: Verify generated attestations
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  while IFS= read -r asset; do
                    gh attestation verify "$asset" --repo "$GITHUB_REPOSITORY"
                  done < <(find release-assets -maxdepth 1 -type f -print | sort)

            - name: Upload verified release assets
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: release-assets-${{ github.sha }}
                  path: release-assets/
                  if-no-files-found: error
                  compression-level: 0
                  retention-days: 1

    github-release:
        name: Publish GitHub release
        runs-on: ubuntu-latest
        needs: [release-assets, version]
        if: >-
            ${{
              needs.release-assets.result == 'success' &&
              needs.version.result == 'success' &&
              needs.version.outputs.tag_exists == 'false'
            }}
        timeout-minutes: 10
        permissions:
            contents: write

        steps:
            - name: Checkout release commit
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
              with:
                  fetch-depth: 0

            - name: Download verified release assets
              uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
              with:
                  name: release-assets-${{ github.sha }}
                  path: release-assets

            - name: Verify release source and downloaded assets
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: v${{ needs.version.outputs.version }}
              run: |
                  set -euo pipefail
                  default_branch=$(gh api "repos/$GITHUB_REPOSITORY" --jq .default_branch)
                  if [[ "$GITHUB_REF" != "refs/heads/$default_branch" ]]; then
                    echo "Release must run from the default branch ($default_branch), not $GITHUB_REF." >&2
                    exit 1
                  fi

                  git fetch --no-tags origin "$default_branch"
                  if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$default_branch"; then
                    echo "$GITHUB_SHA is not merged into origin/$default_branch." >&2
                    exit 1
                  fi
                  if [[ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]]; then
                    echo "Checkout does not match the workflow commit $GITHUB_SHA." >&2
                    exit 1
                  fi
                  if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
                    echo "Tag $TAG already exists; refusing to move or replace it." >&2
                    exit 1
                  fi
                  if gh release view "$TAG" >/dev/null 2>&1; then
                    echo "Release $TAG already exists; refusing to replace it." >&2
                    exit 1
                  fi

                  cd release-assets
                  sha256sum --check SHA256SUMS

            - name: Create, verify, and publish release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: v${{ needs.version.outputs.version }}
              run: |
                  set -euo pipefail

                  marker="<!-- fylo-release-workflow:${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT} -->"
                  published=false
                  release_id=''

                  find_workflow_draft() {
                    gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" | jq -ce \
                      --arg marker "$marker" \
                      --arg tag "$TAG" \
                      '[.[] | select(.draft == true and .tag_name == $tag and ((.body // "") | contains($marker)))] | if length == 1 then .[0] else error("expected exactly one workflow draft") end'
                  }

                  cleanup_draft() {
                    status=$?
                    trap - EXIT
                    if [[ "$published" != true ]]; then
                      if [[ -n "$release_id" ]]; then
                        release=$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id" 2>/dev/null || true)
                      else
                        release=$(find_workflow_draft 2>/dev/null || true)
                        release_id=$(jq -r '.id // empty' <<<"${release:-{}}")
                      fi
                      if [[ -n "$release" ]] && jq -e \
                        --arg marker "$marker" \
                        '.draft == true and ((.body // "") | contains($marker))' \
                        <<<"$release" >/dev/null; then
                        echo "Cleaning up unpublished workflow draft $TAG."
                        cleaned=false
                        for _ in {1..3}; do
                          if gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$release_id"; then
                            cleaned=true
                            break
                          fi
                          sleep 2
                        done
                        if [[ "$cleaned" != true ]]; then
                          echo "::error::Failed to clean up draft release $TAG"
                        fi
                      fi
                    fi
                    exit "$status"
                  }
                  trap cleanup_draft EXIT

                  mapfile -t assets < <(find release-assets -maxdepth 1 -type f -print | sort)
                  gh release create "$TAG" "${assets[@]}" \
                    --draft \
                    --target "$GITHUB_SHA" \
                    --title "$TAG" \
                    --generate-notes \
                    --notes "$marker"

                  release=$(find_workflow_draft)
                  release_id=$(jq -er '.id' <<<"$release")
                  jq -e \
                    --arg marker "$marker" \
                    --arg target "$GITHUB_SHA" \
                    '.draft == true and .target_commitish == $target and ((.body // "") | contains($marker))' \
                    <<<"$release" >/dev/null

                  expected=$(find release-assets -maxdepth 1 -type f -print | sed 's|.*/||' | sort)
                  actual=$(jq -r '.assets[].name' <<<"$release" | sort)
                  diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")
                  jq -e 'all(.assets[]; .size > 0)' <<<"$release" >/dev/null
                  while IFS= read -r asset; do
                    local_digest=$(sha256sum "release-assets/$asset" | awk '{print $1}')
                    remote_digest=$(jq -er \
                      --arg asset "$asset" \
                      '.assets[] | select(.name == $asset) | .digest' \
                      <<<"$release")
                    if [[ "$remote_digest" != "sha256:$local_digest" ]]; then
                      echo "Uploaded digest mismatch for $asset." >&2
                      exit 1
                    fi
                  done <<<"$expected"

                  # Publishing the verified draft is the first operation that makes
                  # the missing tag visible. GitHub creates it at --target above.
                  release=$(gh api -X PATCH \
                    "repos/$GITHUB_REPOSITORY/releases/$release_id" \
                    -F draft=false)
                  published=true

                  jq -e '.draft == false' <<<"$release" >/dev/null
                  tag_sha=''
                  for _ in {1..5}; do
                    tag_sha=$(git ls-remote origin "refs/tags/$TAG" | awk '{print $1}')
                    [[ -n "$tag_sha" ]] && break
                    sleep 2
                  done
                  if [[ "$tag_sha" != "$GITHUB_SHA" ]]; then
                    echo "Tag $TAG resolves to $tag_sha, expected $GITHUB_SHA." >&2
                    exit 1
                  fi
