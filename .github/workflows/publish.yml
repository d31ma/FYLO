name: Publish

on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            promote_npm:
                description: Promote the GitHub Packages artifact to npm after stability is confirmed
                required: false
                default: false
                type: boolean

permissions:
    contents: read
    packages: read

concurrency:
    group: release-${{ github.repository }}
    cancel-in-progress: false

jobs:
    test:
        name: Test before publish
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@d31ma'

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bun run typecheck

            - name: Lint
              run: bun run lint

            - name: Build
              run: bun run build

            - name: Run tests
              run: bun run test

            - name: Run package blackbox tests
              run: bun run test:blackbox

    binary-interop:
        name: Compiled binary interop
        runs-on: macos-latest
        timeout-minutes: 30
        env:
            NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@d31ma'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Dart
              uses: dart-lang/setup-dart@v1

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Install Kotlin compiler
              env:
                  KOTLIN_VERSION: 2.1.10
              run: |
                  set -euo pipefail
                  curl -fsSL \
                    "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip" \
                    -o "$RUNNER_TEMP/kotlin-compiler.zip"
                  unzip -q "$RUNNER_TEMP/kotlin-compiler.zip" -d "$RUNNER_TEMP/kotlin"
                  echo "$RUNNER_TEMP/kotlin/kotlinc/bin" >> "$GITHUB_PATH"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Verify interop language toolchains
              run: |
                  python3 --version
                  ruby --version
                  php --version
                  dart --version
                  javac -version
                  java -version
                  dotnet --version
                  c++ --version
                  swift --version
                  kotlinc -version
                  rustc --version

            - name: Run compiled binary interop tests
              run: bun run test:interop

    version:
        name: Read version
        runs-on: ubuntu-latest
        outputs:
            package_name: ${{ steps.read.outputs.package_name }}
            version: ${{ steps.read.outputs.version }}
            tag_exists: ${{ steps.check.outputs.exists }}
            github_version_exists: ${{ steps.check_github.outputs.exists }}
            npm_version_exists: ${{ steps.check_npm.outputs.exists }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Read package version
              id: read
              run: |
                  PACKAGE_NAME=$(node -p "require('./package.json').name")
                  VERSION=$(node -p "require('./package.json').version")
                  echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Package: $PACKAGE_NAME"
                  echo "Version: $VERSION"

            - name: Check version tag
              id: check
              env:
                  TAG: v${{ steps.read.outputs.version }}
              run: |
                  if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "Tag $TAG already exists; skipping publish and release."
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Check GitHub Packages version
              id: check_github
              env:
                  PACKAGE_NAME: ${{ steps.read.outputs.package_name }}
                  VERSION: ${{ steps.read.outputs.version }}
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  cat > ~/.npmrc <<EOF
                  @d31ma:registry=https://npm.pkg.github.com
                  //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
                  always-auth=true
                  EOF

                  if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "GitHub Packages already has ${PACKAGE_NAME}@${VERSION}."
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Check npm version
              id: check_npm
              env:
                  PACKAGE_NAME: ${{ steps.read.outputs.package_name }}
                  VERSION: ${{ steps.read.outputs.version }}
              run: |
                  if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "npm already has ${PACKAGE_NAME}@${VERSION}."
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

    publish:
        name: Publish to GitHub Packages
        needs: [test, binary-interop, version]
        if: >-
            ${{
              always() &&
              needs.test.result == 'success' &&
              needs.binary-interop.result == 'success' &&
              needs.version.result == 'success' &&
              needs.version.outputs.tag_exists == 'false' &&
              needs.version.outputs.github_version_exists == 'false'
            }}
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            packages: write
        environment: packages-prod

        steps:
            - name: Publish via FOUNDRY
              uses: d31ma/FOUNDRY/.github/actions/publish-github-package@main
              with:
                  package_name: ${{ needs.version.outputs.package_name }}
                  version: ${{ needs.version.outputs.version }}
                  github_dist_tag: beta
                  build_command: bun run build
                  publish_token: ${{ github.token }}
                  packages_read_token: ${{ secrets.PACKAGES_READ_TOKEN || github.token }}
                  install_command: |
                      {
                        echo "@d31ma:registry=https://registry.npmjs.org/"
                      } > .npmrc
                      cp .npmrc ~/.npmrc
                      cat > bunfig.toml <<'EOF'
                      [install.scopes]
                      "@d31ma" = { url = "https://registry.npmjs.org/" }
                      EOF
                      bun install --frozen-lockfile

    promote-npm:
        name: Request npm promotion
        needs: [version, binary-interop, publish]
        if: >-
            ${{
              always() &&
              needs.binary-interop.result == 'success' &&
              (
                (github.event_name == 'workflow_dispatch' && inputs.promote_npm == true) ||
                (github.event_name == 'push')
              ) &&
              (
                needs.publish.result == 'success' ||
                needs.version.outputs.github_version_exists == 'true'
              )
            }}
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read

        steps:
            - name: Dispatch FOUNDRY npm promotion
              env:
                  GH_TOKEN: ${{ secrets.FOUNDRY_DISPATCH_TOKEN }}
                  PACKAGE_NAME: ${{ needs.version.outputs.package_name }}
                  VERSION: ${{ needs.version.outputs.version }}
                  SOURCE_REPOSITORY: ${{ github.repository }}
              run: |
                  set -euo pipefail
                  if [ -z "${GH_TOKEN:-}" ]; then
                    echo "::error::FOUNDRY_DISPATCH_TOKEN is required to request npm promotion from FOUNDRY."
                    exit 1
                  fi

                  jq -n \
                    --arg package_name "$PACKAGE_NAME" \
                    --arg version "$VERSION" \
                    --arg npm_dist_tag "latest" \
                    --arg npm_auth_mode "token" \
                    --arg source_repository "$SOURCE_REPOSITORY" \
                    '{
                      event_type: "promote-npm",
                      client_payload: {
                        package_name: $package_name,
                        version: $version,
                        npm_dist_tag: $npm_dist_tag,
                        npm_auth_mode: $npm_auth_mode,
                        source_repository: $source_repository
                      }
                    }' |
                    gh api repos/d31ma/FOUNDRY/dispatches --input -

    github-release:
        name: Create GitHub release
        runs-on: ubuntu-latest
        needs: [version, binary-interop, publish]
        if: >-
            ${{
              always() &&
              needs.binary-interop.result == 'success' &&
              needs.version.outputs.tag_exists == 'false' &&
              (
                needs.publish.result == 'success' ||
                needs.version.outputs.github_version_exists == 'true'
              )
            }}
        timeout-minutes: 10
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Create and push version tag
              env:
                  VERSION: ${{ needs.version.outputs.version }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git tag -a "v$VERSION" -m "v$VERSION"
                  git push origin "v$VERSION"

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.version.outputs.version }}
              run: |
                  gh release create "v$VERSION" \
                    --title "v$VERSION" \
                    --generate-notes
