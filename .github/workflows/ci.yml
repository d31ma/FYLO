name: CI

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, ready_for_review]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    windows-storage:
        name: Windows storage smoke
        runs-on: windows-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run xattr adapter tests
              run: bun test tests/integration/xattr.test.js --timeout 120000 --parallel=1

            - name: Build and start Windows executable
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force dist-bin | Out-Null
                  bun build --compile ./src/cli/index.js --outfile ./dist-bin/fylo.exe
                  ./dist-bin/fylo.exe --help | Out-Null

    test:
        name: Test (Bun latest)
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Install CHEX and TTID binaries
              run: |
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Type check
              run: bun run typecheck

            - name: Lint
              run: bun run lint

            - name: Run tests
              run: bun run test

    binary-interop:
        name: Compiled Binary Interop
        runs-on: macos-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Dart
              uses: dart-lang/setup-dart@v1

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.22'

            - name: Install Kotlin compiler
              env:
                  KOTLIN_VERSION: 2.1.10
              run: |
                  set -euo pipefail
                  curl -fsSL \
                    "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip" \
                    -o "$RUNNER_TEMP/kotlin-compiler.zip"
                  unzip -q "$RUNNER_TEMP/kotlin-compiler.zip" -d "$RUNNER_TEMP/kotlin"
                  echo "$RUNNER_TEMP/kotlin/kotlinc/bin" >> "$GITHUB_PATH"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Install CHEX and TTID binaries
              run: |
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Verify interop language toolchains
              run: |
                  python3 --version
                  ruby --version
                  php --version
                  dart --version
                  javac -version
                  java -version
                  dotnet --version
                  c++ --version
                  swift --version
                  kotlinc -version
                  rustc --version

            - name: Run compiled binary interop tests
              run: bun run test:interop
