name: CI

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, ready_for_review]

permissions:
    contents: read
    packages: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Test (Bun ${{ matrix.bun-version }})
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        strategy:
            matrix:
                bun-version: [latest, 1.2.x]

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@d31ma'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ matrix.bun-version }}

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bun run typecheck

            - name: Lint
              run: bun run lint

            - name: Build
              run: bun run build

            - name: Run tests
              run: bun run test

            - name: Run package blackbox tests
              if: matrix.bun-version == 'latest'
              run: bun run test:blackbox

    blackbox-config:
        name: Detect blackbox configuration
        runs-on: ubuntu-latest
        outputs:
            enabled: ${{ steps.detect.outputs.enabled }}
        env:
            BLACKBOX_REPOSITORY: ${{ vars.FYLO_BLACKBOX_REPOSITORY || secrets.FYLO_BLACKBOX_REPOSITORY || vars.BLACKBOX_REPOSITORY || secrets.BLACKBOX_REPOSITORY || vars.NIGHTJAR_BLACKBOX_REPOSITORY || secrets.NIGHTJAR_BLACKBOX_REPOSITORY }}
            BLACKBOX_SSH_KEY: ${{ secrets.FYLO_BLACKBOX_SSH_KEY || secrets.BLACKBOX_SSH_KEY || secrets.NIGHTJAR_BLACKBOX_SSH_KEY }}

        steps:
            - id: detect
              name: Check private suite credentials
              run: |
                  if [ -n "$BLACKBOX_REPOSITORY" ] && [ -n "$BLACKBOX_SSH_KEY" ]; then
                    echo "enabled=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "enabled=false" >> "$GITHUB_OUTPUT"
                    echo "Blackbox configuration not present; skipping private package validation."
                  fi

    package-blackbox:
        name: NightJar security blackbox tests
        runs-on: ubuntu-latest
        needs: blackbox-config
        if: needs.blackbox-config.outputs.enabled == 'true'
        timeout-minutes: 20
        env:
            BLACKBOX_REPOSITORY: ${{ vars.FYLO_BLACKBOX_REPOSITORY || secrets.FYLO_BLACKBOX_REPOSITORY || vars.BLACKBOX_REPOSITORY || secrets.BLACKBOX_REPOSITORY || vars.NIGHTJAR_BLACKBOX_REPOSITORY || secrets.NIGHTJAR_BLACKBOX_REPOSITORY }}
            BLACKBOX_SSH_KEY: ${{ secrets.FYLO_BLACKBOX_SSH_KEY || secrets.BLACKBOX_SSH_KEY || secrets.NIGHTJAR_BLACKBOX_SSH_KEY }}
            NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        steps:
            - name: Checkout FYLO
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@d31ma'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build package
              run: bun run build

            - name: Pack package under test
              id: pack
              run: |
                  npm pack --json --ignore-scripts > /tmp/fylo-pack.json
                  filename=$(node -e "console.log(require('/tmp/fylo-pack.json')[0].filename)")
                  echo "tarball=$PWD/$filename" >> "$GITHUB_OUTPUT"

            - name: Require private blackbox credentials
              run: |
                  if [ -z "$BLACKBOX_REPOSITORY" ]; then
                    echo "::error::Missing BLACKBOX_REPOSITORY variable"
                    exit 1
                  fi
                  if [ -z "$BLACKBOX_SSH_KEY" ]; then
                    echo "::error::Missing BLACKBOX_SSH_KEY secret"
                    exit 1
                  fi

            - name: Checkout private blackbox suite
              uses: actions/checkout@v6
              with:
                  repository: ${{ env.BLACKBOX_REPOSITORY }}
                  ssh-key: ${{ env.BLACKBOX_SSH_KEY }}
                  ref: ${{ vars.FYLO_BLACKBOX_REF || vars.BLACKBOX_REF || vars.NIGHTJAR_BLACKBOX_REF || 'main' }}
                  path: .blackbox-tests

            - name: Patch FYLO blackbox helper for GitHub Packages
              run: node scripts/patch-nightjar-fylo-blackbox.mjs .blackbox-tests

            - name: Run FYLO security blackbox tests
              working-directory: .blackbox-tests
              env:
                  FYLO_PACKAGE_TARBALL: ${{ steps.pack.outputs.tarball }}
                  NIGHTJAR_SUITE: fylo
              run: |
                  if [ -f package.json ] || [ -f bun.lock ] || [ -f bun.lockb ]; then
                    bun install --frozen-lockfile
                  fi

                  bun test fylo/security-contract.test.mjs --timeout 120000
