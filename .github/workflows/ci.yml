name: CI

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, ready_for_review]

permissions:
    contents: read
    packages: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Test (Bun latest)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@d31ma'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bun run typecheck

            - name: Lint
              run: bun run lint

            - name: Build
              run: bun run build

            - name: Run tests
              run: bun run test

            - name: Run package blackbox tests
              run: bun run test:blackbox

    binary-interop:
        name: Compiled Binary Interop
        runs-on: macos-latest
        timeout-minutes: 30
        env:
            NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@d31ma'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Dart
              uses: dart-lang/setup-dart@v1

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Install Kotlin compiler
              env:
                  KOTLIN_VERSION: 2.1.10
              run: |
                  set -euo pipefail
                  curl -fsSL \
                    "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip" \
                    -o "$RUNNER_TEMP/kotlin-compiler.zip"
                  unzip -q "$RUNNER_TEMP/kotlin-compiler.zip" -d "$RUNNER_TEMP/kotlin"
                  echo "$RUNNER_TEMP/kotlin/kotlinc/bin" >> "$GITHUB_PATH"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Verify interop language toolchains
              run: |
                  python3 --version
                  ruby --version
                  php --version
                  dart --version
                  javac -version
                  java -version
                  dotnet --version
                  c++ --version
                  swift --version
                  kotlinc -version
                  rustc --version

            - name: Run compiled binary interop tests
              run: bun run test:interop
