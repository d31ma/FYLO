name: CI

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, ready_for_review]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    windows-storage:
        name: Windows x64 storage safety (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                os: [windows-2022, windows-2025]

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version-file: .bun-version

            - name: Assert native Windows x64 runner
              shell: pwsh
              run: |
                  if (-not [Environment]::Is64BitOperatingSystem) {
                    throw 'The Windows storage gate requires a 64-bit operating system.'
                  }
                  if ($env:RUNNER_OS -ne 'Windows') {
                    throw "The Windows storage gate cannot run on $env:RUNNER_OS."
                  }
                  $platform = bun -p "process.platform"
                  $architecture = bun -p "process.arch"
                  if ($platform -ne 'win32' -or $architecture -ne 'x64') {
                    throw "Expected native win32/x64 Bun, received $platform/$architecture."
                  }

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Install verified Windows vendor binaries
              shell: pwsh
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: ./scripts/install-vendor-bins.ps1

            - name: Verify native lock crash and reclaim
              run: bun test tests/integration/fs-lock.test.js --timeout 120000 --parallel=1

            - name: Verify interrupted transaction recovery
              run: bun test tests/integration/transactions.test.js tests/integration/crash-recovery.test.js --timeout 120000 --parallel=1

            - name: Verify NTFS junction and reparse-point defenses
              run: bun test tests/integration/document-path-security.test.js tests/integration/secure-open.test.js --timeout 120000 --parallel=1

            - name: Run Windows storage regression suite
              run: bun test tests/integration/xattr.test.js tests/integration/durable.test.js tests/integration/filesystem.test.js tests/integration/raw-files.test.js tests/integration/collection-lock.test.js tests/integration/vcs-recovery.test.js --timeout 120000 --parallel=1

            - name: Build native Windows executable
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force dist-bin | Out-Null
                  bun build --compile ./src/cli/index.js --outfile ./dist-bin/fylo.exe

            - name: Verify compiled Windows executable behavior
              env:
                  FYLO_REQUIRE_WINDOWS_NATIVE: '1'
              run: bun test tests/interop/windows-native-binary.test.js --timeout 120000 --parallel=1

    test:
        name: Test (pinned Bun)
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version-file: .bun-version

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Install CHEX and TTID binaries
              run: |
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Type check
              run: bun run typecheck

            - name: Lint
              run: bun run lint

            - name: Run tests
              run: bun run test

    binary-interop:
        name: Compiled Binary Interop
        runs-on: macos-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version-file: .bun-version

            - name: Setup Dart
              uses: dart-lang/setup-dart@v1

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: '8.0.x'

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.22'

            - name: Install Kotlin compiler
              env:
                  KOTLIN_VERSION: 2.1.10
              run: |
                  set -euo pipefail
                  curl -fsSL \
                    "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip" \
                    -o "$RUNNER_TEMP/kotlin-compiler.zip"
                  unzip -q "$RUNNER_TEMP/kotlin-compiler.zip" -d "$RUNNER_TEMP/kotlin"
                  echo "$RUNNER_TEMP/kotlin/kotlinc/bin" >> "$GITHUB_PATH"

            - name: Install dependencies
              run: |
                  bun install --frozen-lockfile
                  (cd website && bun install --frozen-lockfile)
                  (cd explorer && bun install --frozen-lockfile)

            - name: Install CHEX and TTID binaries
              run: |
                  sh ./scripts/install-vendor-bins.sh
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Verify interop language toolchains
              run: |
                  python3 --version
                  ruby --version
                  php --version
                  dart --version
                  javac -version
                  java -version
                  dotnet --version
                  c++ --version
                  swift --version
                  kotlinc -version
                  rustc --version

            - name: Run compiled binary interop tests
              run: bun run test:interop
